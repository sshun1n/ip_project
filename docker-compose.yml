version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: artifact-swap-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=artifact-swap

  artifact-swap:
    build: .
    container_name: artifact-swap
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/artifact-swap
      - COOKIE_SECRET=${COOKIE_SECRET:-c0sm1c-pr0d-s3cr3t-7g}
    volumes:
      - app-artifacts:/app/public/artifacts

volumes:
  mongo-data:
    driver: local
  app-artifacts:
    driver: local
